name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Phase 1: Validate (runs on every PR and push to main) ──
  validate:
    name: Validate (Lint, Typecheck, Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E
        env:
          CI: true
        run: npm test

      # ── Security checks ──

      - name: Scan for hardcoded secrets
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          PATTERNS='(api[_-]?key|secret|password|token)\s*[:=]\s*["\x27][A-Za-z0-9+/=_-]{8,}'
          if grep -rPn "$PATTERNS" --include="*.js" --include="*.ts" --include="*.json" --include="*.html" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude=".env.example" .; then
            echo "❌ Potential hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"

      - name: Verify .gitignore security entries
        run: |
          echo "🔍 Checking .gitignore..."
          for pattern in ".env" "*.key" "*.pem"; do
            if grep -qF "$pattern" .gitignore; then
              echo "  ✅ $pattern is excluded"
            else
              echo "  ❌ $pattern is NOT in .gitignore"
              exit 1
            fi
          done

      - name: Audit manifest.json
        run: |
          echo "🔍 Auditing manifest.json..."
          node --input-type=module << 'EOF'
            import { readFileSync } from 'fs';
            const m = JSON.parse(readFileSync('./manifest.json', 'utf8'));

            // Warn (not fail) about broad host permissions — extensions may legitimately need them
            const broadPerms = ['<all_urls>', '*://*/*'];
            const hostPerms = m.host_permissions || [];
            if (hostPerms.some(p => broadPerms.includes(p))) {
              console.warn('⚠ Broad host_permissions in use:', hostPerms, '— ensure this is intentional');
            } else {
              console.log('✅ host_permissions are scoped:', hostPerms);
            }

            // Fail on unsafe-eval in CSP (Manifest V3 violation)
            if (m.content_security_policy?.extension_pages?.includes('unsafe-eval')) {
              console.error('❌ CSP allows unsafe-eval');
              process.exit(1);
            }
            console.log('✅ CSP does not allow unsafe-eval');

            // Verify version field exists
            if (!m.version) {
              console.error('❌ manifest.json is missing a version field');
              process.exit(1);
            }
            console.log('✅ manifest.json version:', m.version);
          EOF

      - name: Check for inline scripts
        run: |
          echo "🔍 Checking for inline scripts in HTML..."
          if grep -Pn '<script[^>]*>[^<]+</script>' --include="*.html" -r . \
            --exclude-dir=node_modules \
            --exclude-dir=playwright-report \
            --exclude-dir=coverage \
            --exclude-dir=test-results; then
            echo "❌ Inline scripts found (Manifest V3 violation)"
            exit 1
          fi
          echo "✅ No inline scripts found"

  # ── Phase 2: Build (depends on Validate passing) ──
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync version (prebuild)
        run: npm run prebuild

      - name: Build
        run: npm run build

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(node --input-type=module -e "
            import { readFileSync } from 'fs';
            const m = JSON.parse(readFileSync('./manifest.json', 'utf8'));
            process.stdout.write(m.version);
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Phase 3: Package ──

      - name: Package extension artifact
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r "iq-copilot-extension-${VERSION}.zip" \
            manifest.json \
            icons/ \
            src/background.js \
            src/content_script.js \
            src/sidebar.html \
            src/sidebar.css \
            src/sidebar.js \
            src/copilot-rpc.js \
            src/achievement-engine.js \
            src/lib/ \
            -x "*.DS_Store" "*.map"
          echo "📦 Extension zip contents:"
          unzip -l "iq-copilot-extension-${VERSION}.zip"

      - name: Verify extension zip has no secrets
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "🔍 Verifying zip contains no .env or secret files..."
          if unzip -l "iq-copilot-extension-${VERSION}.zip" | grep -iE '\.env|\.key|\.pem|secret'; then
            echo "❌ Sensitive files found in extension zip!"
            exit 1
          fi
          echo "✅ Extension zip looks clean"

      - name: Package companion artifact
        run: |
          VERSION=${{ steps.version.outputs.version }}
          zip -r "iq-copilot-companion-${VERSION}.zip" \
            dist/proxy.js \
            start.sh \
            README.md
          echo "📦 Companion zip contents:"
          unzip -l "iq-copilot-companion-${VERSION}.zip"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: iq-copilot-extension-${{ steps.version.outputs.version }}
          path: iq-copilot-extension-${{ steps.version.outputs.version }}.zip

      - name: Upload companion artifact
        uses: actions/upload-artifact@v4
        with:
          name: iq-copilot-companion-${{ steps.version.outputs.version }}
          path: iq-copilot-companion-${{ steps.version.outputs.version }}.zip

  # ── Phase 4A: Nightly prerelease (push to main) ──
  prerelease:
    name: Create Nightly Prerelease
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: iq-copilot-extension-${{ needs.build.outputs.version }}

      - name: Download companion artifact
        uses: actions/download-artifact@v4
        with:
          name: iq-copilot-companion-${{ needs.build.outputs.version }}

      - name: Compute prerelease metadata
        id: prerelease_meta
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="nightly-v${VERSION}-${SHORT_SHA}"
          NAME="Nightly v${VERSION} (${SHORT_SHA})"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Create nightly prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prerelease_meta.outputs.tag }}
          name: ${{ steps.prerelease_meta.outputs.name }}
          generate_release_notes: true
          prerelease: true
          files: |
            iq-copilot-extension-${{ needs.build.outputs.version }}.zip
            iq-copilot-companion-${{ needs.build.outputs.version }}.zip

  # ── Phase 4B: Formal release (push version tag) ──
  release:
    name: Create Formal Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: iq-copilot-extension-${{ needs.build.outputs.version }}

      - name: Download companion artifact
        uses: actions/download-artifact@v4
        with:
          name: iq-copilot-companion-${{ needs.build.outputs.version }}

      - name: Create formal release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: false
          files: |
            iq-copilot-extension-${{ needs.build.outputs.version }}.zip
            iq-copilot-companion-${{ needs.build.outputs.version }}.zip
