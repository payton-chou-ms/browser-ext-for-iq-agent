name: "IQ Copilot CodeQL Configuration"

# Use default queries plus security-extended
queries:
  - uses: security-extended

# Path filters - exclude test and build output directories
paths-ignore:
  - coverage
  - playwright-report
  - test-results
  - node_modules
  - output
  - dist
  - "**/*.test.js"
  - "**/*.test.ts"
  - "**/*.spec.js"

# Data extensions for custom sanitizer recognition
# parseAndSanitize() in src/lib/utils.js is a strict allowlist-based HTML sanitizer
# that removes all disallowed tags/attributes via cleanNode() before DOM insertion
data-extensions:
  - .github/codeql/extensions/*.yml
