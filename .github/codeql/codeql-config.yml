name: "IQ Copilot CodeQL Configuration"

# Use default queries plus security-extended
queries:
  - uses: security-extended

# Path filters - exclude test and build output directories
paths-ignore:
  - coverage
  - playwright-report
  - test-results
  - node_modules
  - output
  - dist
  - "**/*.test.js"
  - "**/*.test.ts"
  - "**/*.spec.js"

# Note: parseAndSanitize() in src/lib/utils.js is a strict allowlist-based HTML
# sanitizer that removes all disallowed tags/attributes via cleanNode() before
# DOM insertion. Any js/xss-through-dom alerts on this function are false positives
# and should be dismissed manually in the GitHub Security tab.
