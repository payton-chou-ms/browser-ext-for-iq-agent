extensions:
  # ═══════════════════════════════════════════════════════════════════════════
  # IQ Copilot Custom Sanitizer Definitions  
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # parseAndSanitize() in src/lib/utils.js is an allowlist-based HTML sanitizer.
  # After cleanNode() runs, all dangerous content is removed via strict allowlist.
  # ═══════════════════════════════════════════════════════════════════════════

  - addsTo:
      pack: codeql/javascript-all
      extensible: summaryModel
    data:
      # summaryModel(type, path, input, output, kind)
      # "value" kind indicates data flows but is not tainted (sanitized)
      - ["IQ.utils", "Member[parseAndSanitize]", "Argument[0]", "ReturnValue", "value"]
