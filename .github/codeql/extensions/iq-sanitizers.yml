extensions:
  # ═══════════════════════════════════════════════════════════════════════════
  # IQ Copilot Custom Sanitizer Definitions
  # ═══════════════════════════════════════════════════════════════════════════
  #
  # parseAndSanitize() in src/lib/utils.js is an allowlist-based HTML sanitizer:
  # 1. Parses HTML with DOMParser
  # 2. Calls cleanNode() which recursively sanitizes all children
  # 3. cleanNode removes all tags not in ALLOWED_TAGS (30 safe tags)
  # 4. cleanNode removes all attributes not in ALLOWED_ATTRS per tag
  # 5. cleanNode blocks javascript:/data: URLs in href/src
  # 6. Returns sanitized body element
  #
  # The output is safe for DOM insertion because only allowlisted content remains.
  # ═══════════════════════════════════════════════════════════════════════════

  - addsTo:
      pack: codeql/javascript-all
      extensible: barrierGuardModel
    data:
      # cleanNode acts as an XSS barrier - after it runs, the node is sanitized
      # Format: [type, path, resultAccess]
      - ["cleanNode", "Argument[0]"]

  - addsTo:
      pack: codeql/javascript-all
      extensible: sanitizerGuardModel
    data:
      # parseAndSanitize returns sanitized content
      - ["parseAndSanitize", "ReturnValue"]
