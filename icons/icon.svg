<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.25"/>
      <stop offset="50%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28" fill="url(#shine)"/>
  <!-- Brain/IQ icon - stylized lightbulb with brain pattern -->
  <!-- Lightbulb body -->
  <ellipse cx="64" cy="52" rx="26" ry="28" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <!-- Brain line left -->
  <path d="M52 42 Q58 52 52 62" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Brain line right -->
  <path d="M76 42 Q70 52 76 62" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Brain center line -->
  <path d="M64 30 L64 70" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  <!-- Lightbulb base -->
  <rect x="54" y="78" width="20" height="6" rx="2" fill="#fff"/>
  <rect x="56" y="86" width="16" height="4" rx="2" fill="#fff"/>
  <rect x="58" y="92" width="12" height="3" rx="1.5" fill="#fff"/>
  <!-- Sparkles -->
  <circle cx="22" cy="24" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="106" cy="24" r="2" fill="#fff" opacity="0.5"/>
  <circle cx="100" cy="90" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="24" cy="80" r="2" fill="#fff" opacity="0.4"/>
  <!-- IQ text -->
  <text x="64" y="118" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#fff" opacity="0.9">IQ</text>
</svg>
